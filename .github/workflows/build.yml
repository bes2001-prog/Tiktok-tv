name: Build TikTok TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/tiktoktv.keystore

      - name: Build signed APK
        run: gradle assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          KEYSTORE_PATH: ${{ github.workspace }}/../tiktoktv.keystore
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK with fixed keystore
        run: |
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/release/TikTokTV.apk"
          # Sign with our fixed keystore
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner sign \
            --ks $HOME/tiktoktv.keystore \
            --ks-pass pass:albo2024tv \
            --key-pass pass:albo2024tv \
            --ks-key-alias tiktoktv \
            --out $SIGNED \
            $UNSIGNED
          echo "Signed APK size: $(du -sh $SIGNED)"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikTokTV-APK
          path: app/build/outputs/apk/release/TikTokTV.apk
          retention-days: 30
