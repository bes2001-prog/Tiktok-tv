name: Build TikTok TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Decode keystore into workspace
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > tiktoktv.keystore

      - name: Build signed release APK
        run: gradle assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          KEYSTORE_PATH: tiktoktv.keystore
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          ls app/build/outputs/apk/release/
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/TikTokTV.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TikTokTV-APK
          path: app/build/outputs/apk/release/TikTokTV.apk
          retention-days: 30
